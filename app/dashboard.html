<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dashboard - Krewe Mystique</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/">Krewe Mystique</a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="/">Home</a>
          <a href="/history.html">History</a>
          <a href="/royal-court.html">Royal Court</a>
          <a href="/photos.html">Photos</a>
          <a href="/events.html">Events</a>
          <a href="/contact.html">Contact</a>
          <a href="/register.html">Join</a>
        </nav>
      </div>
    </header>

    <main class="db-layout container">

      <!-- Profile hero banner -->
      <div id="profile" class="db-hero"></div>

      <!-- Dashboard tab nav -->
      <nav class="db-tabs" aria-label="Dashboard sections">
        <button class="db-tab is-active" data-tab="info">My Info</button>
        <button class="db-tab" data-tab="admin" id="db-tab-admin" hidden>Admin</button>
      </nav>

      <!-- Tab: My Info -->
      <div class="db-tab-panel is-active" id="db-panel-info">
        <div class="db-cards-grid">

          <!-- Contact card -->
          <div class="db-card" id="profile-details-section" style="display:none;">
            <div class="db-card-header">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
              <h3>Contact &amp; Personal</h3>
            </div>
            <form id="profile-details-form" class="db-form" novalidate>
              <div class="db-form-grid">
                <div class="form-group">
                  <label for="pd-phone">Phone Number</label>
                  <input type="tel" id="pd-phone" name="phone" placeholder="e.g. 555-867-5309" />
                </div>
                <div class="form-group">
                  <label for="pd-spouse">Spouse / Partner</label>
                  <input type="text" id="pd-spouse" name="spouse_name" placeholder="Full name" />
                </div>
              </div>
              <div class="form-group">
                <label for="pd-address">Home Address</label>
                <input type="text" id="pd-address" name="address" placeholder="123 Main St, New Orleans, LA 70130" />
              </div>
              <div class="form-group">
                <label for="pd-guest">Guest Name</label>
                <input type="text" id="pd-guest" name="guest_name" placeholder="Guest riding with you" />
              </div>

              <div class="db-form-grid">
                <div class="form-group">
                  <label>Children's Names</label>
                  <div id="kids-list"></div>
                  <button type="button" class="db-add-btn" id="add-kid-btn">+ Add Child</button>
                </div>
                <div class="form-group">
                  <label>Float Riders</label>
                  <div id="riders-list"></div>
                  <button type="button" class="db-add-btn" id="add-rider-btn">+ Add Rider</button>
                </div>
              </div>

              <div id="profile-details-feedback" class="db-feedback" aria-live="polite"></div>
              <button type="submit" class="button db-save-btn">Save Information</button>
            </form>
          </div>

        </div><!-- /.db-cards-grid -->
      </div><!-- /#db-panel-info -->



      <!-- Tab: Admin -->
      <div class="db-tab-panel" id="db-panel-admin">
        <div class="db-cards-grid">

          <section id="admin-tools" class="db-card" style="display:none;">
            <div class="db-card-header">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4 6 2.67v4.28c0 3.47-2.56 6.72-6 7.91-3.44-1.19-6-4.44-6-7.91V7.67L12 5zm-1 4v2H9v2h2v2h2v-2h2v-2h-2V9h-2z"/></svg>
              <h3>Admin Tools</h3>
            </div>
            <p style="color:var(--muted); margin-top:0;">Manage krewe members, site settings, backups, and configuration.</p>
            <div style="display:flex; flex-wrap:wrap; gap:0.75rem; margin-top:0.25rem;">
              <a id="open-user-management" class="button secondary" href="/user-management.html">User Management</a>
              <a id="open-site-config" class="button secondary" href="/configuration.html">Site Configuration</a>
              <a id="open-backup-restore" class="button secondary" href="/backup-restore.html">Backup &amp; Restore</a>
            </div>
          </section>

        </div>
      </div><!-- /#db-panel-admin -->

    </main>

    <script src="script.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
