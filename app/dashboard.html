<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dashboard - Krewe Mystique</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/">Krewe Mystique</a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="/">Home</a>
          <a href="/history.html">History</a>
          <a href="/royal-court.html">Royal Court</a>
          <a href="/photos.html">Photos</a>
          <a href="/events.html">Events</a>
          <a href="/contact.html">Contact</a>
          <a href="/register.html">Join</a>
        </nav>
      </div>
    </header>

    <main class="db-layout container">

      <!-- Profile hero banner -->
      <div id="profile" class="db-hero"></div>

      <!-- Dashboard tab nav -->
      <nav class="db-tabs" aria-label="Dashboard sections">
        <button class="db-tab is-active" data-tab="info">My Info</button>
        <button class="db-tab" data-tab="admin" id="db-tab-admin" hidden>Admin</button>
      </nav>

      <!-- Tab: My Info -->
      <div class="db-tab-panel is-active" id="db-panel-info">
        <div class="db-cards-grid">

          <!-- Contact card -->
          <div class="db-card" id="profile-details-section" style="display:none;">
            <div class="db-card-header">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
              <h3>Contact &amp; Personal</h3>
            </div>
            <form id="profile-details-form" class="db-form" novalidate>
              <div class="db-form-grid">
                <div class="form-group">
                  <label for="pd-phone">Phone Number</label>
                  <input type="tel" id="pd-phone" name="phone" placeholder="e.g. 555-867-5309" />
                </div>
                <div class="form-group">
                  <label for="pd-spouse">Spouse / Partner</label>
                  <input type="text" id="pd-spouse" name="spouse_name" placeholder="Full name" />
                </div>
              </div>
              <div class="form-group">
                <label for="pd-address">Home Address</label>
                <input type="text" id="pd-address" name="address" placeholder="123 Main St, New Orleans, LA 70130" />
              </div>
              <div class="form-group">
                <label for="pd-guest">Guest Name</label>
                <input type="text" id="pd-guest" name="guest_name" placeholder="Guest riding with you" />
              </div>

              <div class="db-form-grid">
                <div class="form-group">
                  <label>Children's Names</label>
                  <div id="kids-list"></div>
                  <button type="button" class="db-add-btn" id="add-kid-btn">+ Add Child</button>
                </div>
                <div class="form-group">
                  <label>Float Riders</label>
                  <div id="riders-list"></div>
                  <button type="button" class="db-add-btn" id="add-rider-btn">+ Add Rider</button>
                </div>
              </div>

              <div id="profile-details-feedback" class="db-feedback" aria-live="polite"></div>
              <button type="submit" class="button db-save-btn">Save Information</button>
            </form>
          </div>

        </div><!-- /.db-cards-grid -->
      </div><!-- /#db-panel-info -->



      <!-- Tab: Admin -->
      <div class="db-tab-panel" id="db-panel-admin">
        <div class="db-cards-grid db-cards-grid--2">

          <section id="admin-tools" class="db-card" style="display:none;">
            <div class="db-card-header">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4 6 2.67v4.28c0 3.47-2.56 6.72-6 7.91-3.44-1.19-6-4.44-6-7.91V7.67L12 5zm-1 4v2H9v2h2v2h2v-2h2v-2h-2V9h-2z"/></svg>
              <h3>Admin Tools</h3>
            </div>
            <p style="color:var(--muted); margin-top:0;">Manage krewe members and site settings.</p>
            <a id="open-user-management" class="button secondary" href="/user-management.html">Open User Management</a>
          </section>

          <section id="site-config-card" class="db-card" style="display:none;">
            <div class="db-card-header">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a6.97 6.97 0 0 0-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
              <h3>Site Configuration</h3>
            </div>
            <form id="site-config-form" class="db-form" novalidate>

              <p class="db-config-section-label">Email / SMTP</p>
              <div class="db-form-grid">
                <div class="form-group">
                  <label for="cfg-smtp-host">SMTP Host</label>
                  <input type="text" id="cfg-smtp-host" name="SMTP_HOST" placeholder="smtp.gmail.com" />
                </div>
                <div class="form-group">
                  <label for="cfg-smtp-port">SMTP Port</label>
                  <input type="text" id="cfg-smtp-port" name="SMTP_PORT" placeholder="587" />
                </div>
                <div class="form-group">
                  <label for="cfg-smtp-user">SMTP Username</label>
                  <input type="text" id="cfg-smtp-user" name="SMTP_USER" placeholder="you@gmail.com" autocomplete="off" />
                </div>
                <div class="form-group">
                  <label for="cfg-smtp-pass">SMTP Password / App Key</label>
                  <input type="password" id="cfg-smtp-pass" name="SMTP_PASS" placeholder="••••••••" autocomplete="new-password" />
                </div>
              </div>
              <div class="db-form-grid">
                <div class="form-group">
                  <label for="cfg-smtp-from">From Address</label>
                  <input type="text" id="cfg-smtp-from" name="SMTP_FROM" placeholder='Krewe Mystique &lt;no-reply@example.com&gt;' />
                </div>
                <div class="form-group">
                  <label for="cfg-smtp-reply-to">Reply-To Address</label>
                  <input type="text" id="cfg-smtp-reply-to" name="SMTP_REPLY_TO" placeholder="you@example.com" />
                </div>
                <div class="form-group">
                  <label for="cfg-smtp-secure">Use TLS (SMTP_SECURE)</label>
                  <select id="cfg-smtp-secure" name="SMTP_SECURE">
                    <option value="false">false (STARTTLS / port 587)</option>
                    <option value="true">true (SSL / port 465)</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="cfg-contact-recipient">Contact Form Recipient</label>
                  <input type="text" id="cfg-contact-recipient" name="CONTACT_RECIPIENT" placeholder="you@example.com" />
                </div>
              </div>

              <p class="db-config-section-label" style="margin-top:1rem;">Registration</p>
              <div class="db-form-grid">
                <div class="form-group">
                  <label for="cfg-code-ttl">Verification Code TTL (minutes)</label>
                  <input type="number" id="cfg-code-ttl" name="REGISTRATION_CODE_TTL_MINUTES" min="1" max="60" placeholder="10" />
                </div>
              </div>

              <div id="site-config-feedback" class="db-feedback" aria-live="polite"></div>
              <div style="display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap;">
                <button type="submit" class="button db-save-btn">Save Configuration</button>
                <span style="font-size:0.8rem; color:var(--muted);">Changes take effect after a server restart.</span>
              </div>
            </form>
          </section>

        </div>
      </div><!-- /#db-panel-admin -->

    </main>

    <script src="script.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
