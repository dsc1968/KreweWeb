<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login - Krewe Mystique</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/">Krewe Mystique</a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="/">Home</a>
          <a href="/history.html">History</a>
          <a href="/royal-court.html">Royal Court</a>
          <a href="/photos.html">Photos</a>
          <a href="/events.html">Events</a>
          <a href="/contact.html">Contact</a>
          <a href="/register.html">Join</a>
        </nav>
      </div>
    </header>

    <main class="auth-page">
      <div class="auth-card container">
        <h1>Member Login</h1>
        <form id="login-form">
          <label for="login_email">Email</label>
          <input id="login_email" name="email" type="email" required />

          <label for="login_password">Password</label>
          <input id="login_password" name="password" type="password" required />

          <button class="button primary" type="submit">Log in</button>
        </form>
        <p>
          New here? <a href="/register.html">Create an account</a>
        </p>

        <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1);">
          <p style="font-size: 0.9rem; color: var(--muted); margin: 0 0 1rem 0;">Demo Accounts (Development Only):</p>
          <button type="button" class="button secondary" style="width: 100%; margin-bottom: 0.5rem;" onclick="autofill('demo@krewe.local', 'demo123')">
            Demo Member
          </button>
          <button type="button" class="button secondary" style="width: 100%;" onclick="autofill('admin@krewe.local', 'admin123')">
            Demo Admin
          </button>
        </div>
      </div>
    </main>

    <script>
      function autofill(email, password) {
        document.getElementById('login_email').value = email;
        document.getElementById('login_password').value = password;
      }
    </script>

    <script src="script.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
